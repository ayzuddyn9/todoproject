<!DOCTYPE html>
<html>
<head>
    <title>Delete Task</title>
</head>
<body>
    <h1>Are sure you want to delete "{{ task.title }}"? </h1>

    <form method="POST">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
        <a href="{% url "task_list" %}">Cancel</a>
    </form>
</body>
</html>
