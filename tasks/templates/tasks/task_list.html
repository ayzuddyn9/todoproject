{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To Do List</title>
    <script src="{% static 'tasks/toggle.js' %}"></script>
</head>
<body>
    <h1>My Tasks</h1>

    <a href="{% url 'create_task' %}">➕ Add Task</a>
    <ul>
        {% for task in tasks %}
            <li data-task-id = "{{ task.id }}">
                {{ task.title }}
                <span
                    class ="toggle-task"
                    style= "cursor: pointer;">
                    {% if task.complete %} ✅ {% else %} ❌ {% endif %}
                </span>
                <a href="{% url "edit_task" task.id %}">✏️</a> 
                <a href="{% url "delete_task" task.id%}">🗑️</a>
                
            </li>
        {% empty %}
            <li>No tasks yet</li>
        {% endfor %}
    </ul>
    
</body>
</html>
